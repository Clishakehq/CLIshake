name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: tests (incl. real-tmux integration)
        run: CLISHAKE_TMUX_ITEST=1 go test ./... -count=1

  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Git identity for the demo's sample repo
        run: |
          git config --global user.name ci
          git config --global user.email ci@example.invalid
          git config --global init.defaultBranch main
      - name: Build
        run: go build -o clishake ./cmd/clishake
      - name: Run the 14-stage orchestration demo
        run: demo/demo.sh
